name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-apkbay
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rsync to VPS
        uses: burnett01/rsync-deployments@7.0.2
        with:
          switches: >-
            -avzr --delete
            --exclude '.git'
            --exclude 'node_modules'
            --exclude '.next'
            --exclude '.env'
            --exclude 'data'
            --exclude 'data/**'
            --exclude 'public/images'
            --exclude 'public/images/**'
            --exclude 'public/files'
            --exclude 'public/files/**'
            --exclude 'public/logo'
            --exclude 'public/logo/**'
            --exclude 'prisma/dev.db'
            --exclude 'prisma/dev.db-journal'
            --exclude 'scripts/liteapks-urls.txt'
            --exclude 'scripts/modyolo-urls.txt'
          path: ./
          remote_path: /opt/apkbay/
          remote_host: ${{ secrets.SSH_HOST }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_key: ${{ secrets.SSH_KEY }}

      - name: Verify production database before deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            DB=/opt/apkbay/data/prod.db
            if [ -f "$DB" ]; then
              SIZE=$(stat -c%s "$DB")
              echo "OK: prod.db exists (${SIZE} bytes) — deploy must preserve it"
              echo "$SIZE" > /tmp/apkbay-pre-deploy-db-size
            else
              echo "WARN: no prod.db yet (first deploy)"
            fi

      - name: Run deploy script
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/apkbay
            chmod +x deploy/scripts/*.sh
            DOMAIN="${{ secrets.DOMAIN }}" APP_PORT=8081 ./deploy/scripts/deploy.sh

      - name: Verify production database after deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            DB=/opt/apkbay/data/prod.db
            if [ ! -f "$DB" ]; then
              echo "ERROR: prod.db missing after deploy"
              exit 1
            fi
            SIZE=$(stat -c%s "$DB")
            if [ -f /tmp/apkbay-pre-deploy-db-size ]; then
              PRE=$(cat /tmp/apkbay-pre-deploy-db-size)
              if [ "$SIZE" -lt "$PRE" ]; then
                echo "ERROR: prod.db shrank from ${PRE} to ${SIZE} bytes — possible data loss"
                exit 1
              fi
              echo "OK: prod.db preserved (${PRE} -> ${SIZE} bytes)"
            else
              echo "OK: prod.db present (${SIZE} bytes)"
            fi

      - name: Health check (HTTPS)
        run: |
          sleep 8
          curl -fsS "https://${{ secrets.DOMAIN }}/" -o /dev/null
          echo "OK: https://${{ secrets.DOMAIN }}/"
